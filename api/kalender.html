<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender Hijriah Global Tunggal (KHGT)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body {
    margin: 0; padding: 20px; background: #eef0f6;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .controls { display:flex; gap:10px; margin-bottom:16px; }
  .controls button, .controls input[type=date] {
    padding: 10px 16px; border-radius: 8px; border: 1px solid #ccc;
    background:#fff; cursor:pointer; font-size:14px;
  }
  .controls button:hover { background:#e6e6f7; }
  #card {
    width: 380px; background:#fff; border-radius: 20px; overflow:hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); position:relative;
  }
  .header {
    text-align:center; padding: 24px 16px 8px; position:relative; overflow:hidden;
  }
  .header::before {
    content:""; position:absolute; top:-40px; left:-40px; width:220px; height:220px;
    background: radial-gradient(circle, #cfd3ea 0%, transparent 70%);
    z-index:0;
  }
  .title { font-weight:800; font-size:20px; color:#111; margin:0; line-height:1.3; position:relative; z-index:1;}
  .weekday {
    font-weight:900; font-size:38px; color:#2b2f8f; margin: 10px 0 16px; position:relative; z-index:1;
    text-transform:uppercase;
  }
  .pill-row { display:flex; align-items:center; margin: 0 20px 10px; position:relative; z-index:1; }
  .day-box {
    width:60px; height:60px; background:#fff; border:2px solid #eee; border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800;
    color:#111; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex-shrink:0;
  }
  .pill { flex:1; margin-left:-14px; padding: 16px 16px 16px 34px; border-radius: 30px; font-size:18px; font-weight:700; color:#fff; }
  .pill-hijri { background:#a8adcf; }
  .pill-greg { background:#2b2f8f; }
  .pasaran-badge {
    text-align:center; font-size:13px; font-weight:700; color:#6b6f9c; margin: -4px 0 14px;
    position:relative; z-index:1;
  }
  .sirah { padding: 6px 22px 22px; position:relative; z-index:1; }
  .sirah-label { color:#e05fb0; font-weight:700; font-size:13px; text-align:center; margin-bottom:4px; }
  .sirah-title { color:#a052d6; font-weight:700; font-size:15px; text-align:center; margin-bottom:10px; }
  .sirah-text { color:#20255c; font-size:14.5px; line-height:1.55; }
  .sirah-text b { color:#161a45; }
  .no-event { text-align:center; color:#999; font-size:14px; padding: 20px 0; }
  .loading { text-align:center; padding: 60px 0; color:#888; }
  footer { margin-top:14px; font-size:12px; color:#888; }
</style>
</head>
<body>

<div class="controls">
  <button id="prevBtn">&#8592; Sebelumnya</button>
  <input type="date" id="datePicker">
  <button id="todayBtn">Hari Ini</button>
  <button id="nextBtn">Berikutnya &#8594;</button>
  <button id="copyBtn">&#128203; Copy Gambar</button>
</div>

<div id="card">
  <div class="loading" id="loadingState">Memuat data KHGT...</div>
</div>

<footer>Sumber data: khgt.muhammadiyah.or.id</footer>

<script>
const API_BASE = "/api/khgt"; // relatif, otomatis mengikuti domain Render tempat file ini dihost

const HIJRI_MONTH_UPPER = {
  "Muharam":"MUHARAM","Safar":"SAFAR","Rabiul Awal":"RABIUL AWAL","Rabiul Akhir":"RABIUL AKHIR",
  "Jumadil Awal":"JUMADIL AWAL","Jumadil Akhir":"JUMADIL AKHIR","Rajab":"RAJAB","Syaban":"SYABAN",
  "Ramadan":"RAMADAN","Syawal":"SYAWAL","Zulkaidah":"ZULKAIDAH","Zulhijah":"ZULHIJAH"
};
const MONTH_ID_UPPER = ["","JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];

let currentDate = new Date();

function fmtISO(d) {
  return d.toISOString().slice(0,10);
}

async function loadData(dateObj) {
  const iso = fmtISO(dateObj);
  document.getElementById('datePicker').value = iso;
  const card = document.getElementById('card');
  card.innerHTML = '<div class="loading">Memuat data KHGT...</div>';
  try {
    const res = await fetch(`${API_BASE}?date=${iso}`);
    if (!res.ok) throw new Error('Data tidak ditemukan');
    const data = await res.json();
    renderCard(data);
  } catch (err) {
    card.innerHTML = `<div class="loading">Gagal memuat data: ${err.message}</div>`;
  }
}

function renderCard(data) {
  const card = document.getElementById('card');
  const hijriMonthUpper = HIJRI_MONTH_UPPER[data.hijri_month] || data.hijri_month.toUpperCase();
  const gregMonthUpper = MONTH_ID_UPPER[data.gregorian_month];

  let sirahHtml = '<div class="no-event">Tidak ada catatan sirah khusus pada tanggal ini.</div>';
  if (data.is_special_day && data.event_name) {
    sirahHtml = `
      <div class="sirah-label">SIRAH NABAWIYAH</div>
      <div class="sirah-title">${data.event_name}</div>
      <div class="sirah-text">${data.event_name}</div>
    `;
  }

  card.innerHTML = `
    <div class="header">
      <p class="title">KALENDER HIJRIAH<br>GLOBAL TUNGGAL<br>(KHGT)</p>
      <div class="weekday">${data.weekday_name_id}</div>
    </div>
    <div class="pill-row">
      <div class="day-box">${data.hijri_day}</div>
      <div class="pill pill-hijri">${hijriMonthUpper} ${data.hijri_year} H</div>
    </div>
    <div class="pill-row">
      <div class="day-box">${data.gregorian_day}</div>
      <div class="pill pill-greg">${gregMonthUpper} ${data.gregorian_year} M</div>
    </div>
    <div class="pasaran-badge">${data.pasaran ? data.pasaran : ''}</div>
    <div class="sirah">${sirahHtml}</div>
  `;
}

document.getElementById('prevBtn').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() - 1);
  loadData(currentDate);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() + 1);
  loadData(currentDate);
});
document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = new Date();
  loadData(currentDate);
});
document.getElementById('datePicker').addEventListener('change', (e) => {
  currentDate = new Date(e.target.value + 'T00:00:00');
  loadData(currentDate);
});
document.getElementById('copyBtn').addEventListener('click', async () => {
  const card = document.getElementById('card');
  try {
    const canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff' });
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        alert('Gambar kalender berhasil disalin! Silakan paste (Ctrl+V) ke WhatsApp.');
      } catch (err) {
        const link = document.createElement('a');
        link.download = 'kalender-khgt.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    });
  } catch (err) {
    alert('Gagal membuat gambar: ' + err.message);
  }
});

loadData(currentDate);
</script>
</body>
</html>
