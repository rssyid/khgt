<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Hijriah Global Tunggal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Amiri:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <!-- Library untuk screenshot/copy image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        
        /* Kotak Kanvas Utama dengan Outline & Sudut Melengkung */
        .square-wrapper {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1 / 1;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 2rem 3rem;
            
            /* --- KODE BORDER GANDA --- */
            border: 4px solid #003F72;        /* Garis border bagian dalam */
            outline: 2px solid #003F72;       /* Garis outline bagian luar */
            outline-offset: -8px;             /* Memberikan jarak renggang antar garis */
            
            /* border-radius: 1.5rem;         /* Opsional: biarkan mati jika ingin sudut siku-siku tegas */
        }

        .watermark {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: -10%;
            width: 70%;
            opacity: 0.08;
            height: auto;
            z-index: 0;
            pointer-events: none;
            object-fit: contain;
        }

        .title-text { font-size: clamp(1.495rem, 4.16vw, 2.6rem); line-height: 1.15; letter-spacing: -0.01em; }
        .day-text { font-size: clamp(2.875rem, 6.875vw, 5rem); letter-spacing: -0.03em; }
        
        .sirah-title-font {
            font-family: 'Amiri', serif;
        }

        /* Pastikan elemen b, i, u di-render dengan benar di dalam contenteditable */
        [contenteditable="true"] b { font-weight: bold; }
        [contenteditable="true"] i { font-style: italic; }
        [contenteditable="true"] u { text-decoration: underline; }

        /* Card Kotak Teks Sirah dengan Outline Tipis */
        .sirah-card {
            background-color: rgba(255, 255, 255, 0.65);
            padding: 1.25rem 2rem;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            width: 88%;
            box-sizing: border-box;
            /* --- TAMBAHAN OUTLINE / BORDER PROFESIONAL --- */
            border: 1.5px solid rgba(6, 95, 70, 0.2); /* Garis bingkai hijau emerald tipis */
        }

        [contenteditable="true"]:hover {
            background-color: rgba(0,0,0,0.03);
            border-radius: 6px;
            cursor: text;
        }
        [contenteditable="true"]:focus {
            outline: 2px dashed #065f46;
            background-color: rgba(0,0,0,0.01);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- KONTROL NAVIGASI (Di luar canvas) -->
    <div class="w-full max-w-[900px] bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap gap-4 justify-between items-center">
        <div class="flex gap-2">
            <button id="prevBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded font-semibold text-gray-700 transition">&larr; Prev</button>
            <input type="date" id="datePicker" class="px-4 py-2 border rounded font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#2c2677]">
            <button id="nextBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded font-semibold text-gray-700 transition">Next &rarr;</button>
        </div>
        <div class="flex gap-2">
            <button id="aiBtn" class="px-4 py-2 bg-[#03a9f4] hover:bg-[#01579b] text-white rounded font-bold transition flex items-center gap-2 shadow">
                🔍 Generate Sirah (AI)
            </button>
            <button id="cekSumberBtn" class="px-4 py-2 bg-[#065f46] hover:bg-[#064e3b] text-white rounded font-bold transition flex items-center gap-2 shadow hidden">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                Cek Sumber
            </button>
            <button id="copyBtn" class="px-5 py-2 bg-[#2c2677] hover:bg-[#1a164c] text-white rounded font-bold transition flex items-center gap-2 shadow">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                Copy Image
            </button>
        </div>
    </div>

    <!-- CANVAS GAMBAR UTAMA -->
    <div class="square-wrapper" id="captureArea">
        <img src="/back.png" alt="Watermark Background" class="watermark">

        <!-- Bagian Judul -->
        <div class="relative z-10 flex-none text-center pt-1">
            <h1 class="title-text font-extrabold text-gray-800 uppercase tracking-tight">
                <span class="block text-xl sm:text-base md:text-lg font-semibold tracking-widest text-[#2c2677] mb-0.5">Kalender Hijriah Global Tunggal</span>
                <span class="text-2xl sm:text-3xl md:text-4xl font-black text-[#2c2677] tracking-wider">(KHGT)</span>
            </h1>
        </div>

        <!-- Bagian Hari & Event -->
        <div class="relative z-10 flex-none flex flex-col items-center mt-2">
            <h2 id="uiHari" class="day-text font-black text-[#2c2677] uppercase drop-shadow-sm">-</h2>
            
            <!-- Wadah Event Dinamis (Muncul jika ada event di database) -->
            <div id="uiEventWrapper" class="mb-2 hidden">
                <span id="uiEventName" class="block text-xs sm:text-sm md:text-base font-semibold tracking-widest text-[#2c2677] px-3 py-0.5 bg-[#b3b6d4]/10 rounded-full"></span>
            </div>
            
            <!-- Wadah Kotak Tanggal -->
            <div class="w-full max-w-[75%] space-y-2.5">
                <!-- Tanggal Hijriah -->
                <div class="bg-[#b3b6d4] rounded-[2.5rem] flex items-center p-2 sm:p-2.5 shadow-md border border-white/50">
                    <div id="uiTglHijri" class="bg-white text-black font-black text-3xl sm:text-5xl rounded-[1.8rem] h-16 w-20 sm:h-20 sm:w-28 flex items-center justify-center flex-none relative overflow-hidden">-</div>
                    <div class="flex-grow text-center text-white text-xl sm:text-2xl font-bold tracking-[0.15em] uppercase">
                        <span id="uiBulanHijri">-</span> <span id="uiTahunHijri" class="opacity-90 text-lg sm:text-xl">-</span>
                    </div>
                </div>

                <!-- Tanggal Masehi -->
                <div class="bg-[#2c2677] rounded-[2.5rem] flex items-center p-2 sm:p-2.5 shadow-lg">
                    <div id="uiTglMasehi" class="bg-white text-black font-black text-3xl sm:text-5xl rounded-[1.8rem] h-16 w-20 sm:h-20 sm:w-28 flex items-center justify-center flex-none relative overflow-hidden">-</div>
                    <div class="flex-grow text-center text-white text-xl sm:text-2xl font-bold tracking-[0.15em] uppercase">
                        <span id="uiBulanMasehi">-</span> <span id="uiTahunMasehi" class="opacity-90 text-lg sm:text-xl">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bagian Sirah Nabawiyah (Font diperbesar 1.2x) -->
        <div class="relative z-10 flex-grow flex flex-col items-center text-center mt-5 px-2 justify-start">
            <div class="sirah-card flex flex-col items-center">
                
                <!-- Badge Kategori -->
                <div class="mb-1.5">
                    <span class="bg-[#b3b6d4]/10 text-[#2c2677] px-3.5 py-0.5 rounded-full text-sm sm:text-base font-bold tracking-widest uppercase whitespace-nowrap">
                        Sirah Nabawiyah
                    </span>
                </div>

                <!-- Judul Peristiwa (Sebelumnya text-lg sm:text-xl md:text-2xl -> Menjadi text-xl sm:text-2xl md:text-3xl) -->
                <div class="mb-1.5 w-full">
                    <h4 id="uiSirahJudul" contenteditable="true" class="sirah-title-font text-[#1e293b] text-xl sm:text-2xl md:text-3xl font-bold leading-tight">
                        Judul Peristiwa
                    </h4>
                </div>

                <!-- Isi Konten (Sebelumnya text-xs sm:text-sm md:text-base -> Menjadi text-sm sm:text-base md:text-lg) -->
                <div id="uiSirahKonten" contenteditable="true" class="text-[#334155] text-sm sm:text-base md:text-lg leading-relaxed font-normal w-full">
                    <p>Klik tombol AI di atas untuk menghasilkan ringkasan Sirah Nabawiyah secara otomatis sesuai tanggal hijriah.</p>
                </div>
                
                <!-- Sumber / Kitab Rujukan (Sebelumnya text-[11px] sm:text-xs md:text-sm -> Menjadi text-xs sm:text-sm md:text-base) -->
                <div class="mt-2.5 pt-2 border-t border-gray-200/80 w-full">
                    <p id="uiSirahSumber" contenteditable="true" class="text-[#b45309] text-xs sm:text-sm md:text-base font-medium italic">
                        (Kitab Rujukan)
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY AI -->
    <div id="aiLoadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex flex-col items-center justify-center text-white">
        <div class="bg-white text-[#2c2677] p-6 rounded-2xl shadow-2xl flex flex-col items-center space-y-4 max-w-sm text-center">
            <div class="w-12 h-12 border-4 border-[#065f46] border-t-transparent rounded-full animate-spin"></div>
            <div>
                <h3 class="font-bold text-lg">AI Sedang Meracik Sirah...</h3>
                <p class="text-xs text-gray-500 mt-1">Menggali peristiwa penting dari kitab-kitab teruji.</p>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        const namaBulanMasehi = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function formatDateISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function loadDateData(dateObj) {
            const dateIso = formatDateISO(dateObj);
            document.getElementById('datePicker').value = dateIso;
            
            try {
                const response = await fetch(`/api/date/${dateIso}`);
                if (!response.ok) throw new Error("Data tidak tersedia");
                
                const data = await response.json();
                
                // Hari & Tanggal
                document.getElementById('uiHari').innerText = data.weekday_name_id;
                document.getElementById('uiTglHijri').innerText = data.hijri_day;
                document.getElementById('uiBulanHijri').innerText = data.hijri_month;
                document.getElementById('uiTahunHijri').innerText = data.hijri_year + " H";
                
                document.getElementById('uiTglMasehi').innerText = data.gregorian_day;
                document.getElementById('uiBulanMasehi').innerText = namaBulanMasehi[data.gregorian_month - 1];
                document.getElementById('uiTahunMasehi').innerText = data.gregorian_year + " M";

                // Tampilkan Event jika ada di database
                const eventWrapper = document.getElementById('uiEventWrapper');
                const eventNameElem = document.getElementById('uiEventName');
                if (data.event_name && data.event_name.trim() !== "") {
                    eventNameElem.innerText = data.event_name;
                    eventWrapper.classList.remove('hidden');
                } else {
                    eventWrapper.classList.add('hidden');
                    eventNameElem.innerText = "";
                }

            } catch (error) {
                console.warn("Data tanggal tidak ditemukan di database lokal:", dateIso);
            }
        }

        // Navigasi Hari
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() - 1);
            loadDateData(currentDate);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() + 1);
            loadDateData(currentDate);
        });

        document.getElementById('datePicker').addEventListener('change', (e) => {
            if (e.target.value) {
                currentDate = new Date(e.target.value);
                loadDateData(currentDate);
            }
        });

        // Variabel global untuk menyimpan URL sumber terakhir
        let currentSumberUrl = null;
        
        // Fitur AI Generate Sirah
        // Fitur AI Generate Sirah
        document.getElementById('aiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiBtn');
            const cekSumberBtn = document.getElementById('cekSumberBtn');
            
            if (btn.disabled) return;
        
            const overlay = document.getElementById('aiLoadingOverlay');
            
            overlay.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            // Sembunyikan tombol cek sumber saat proses baru berjalan
            cekSumberBtn.classList.add('hidden');
            currentSumberUrl = null;
        
            const bulan = document.getElementById('uiBulanHijri').innerText;
            const tanggal = document.getElementById('uiTglHijri').innerText;
        
            try {
                const response = await fetch(`/api/sirah?bulan=${bulan}&tanggal=${tanggal}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Terjadi kesalahan server");
                }
                
                const data = await response.json();
                document.getElementById('uiSirahJudul').innerText = data.Judul;
                document.getElementById('uiSirahKonten').innerHTML = `<p>${data.kontent}</p>`;
                document.getElementById('uiSirahSumber').innerText = `(${data.sumber})`;
                
                // Simpan dan tampilkan tombol Cek Sumber jika URL valid
                if (data.url_sumber && data.url_sumber.trim() !== "" && data.url_sumber.startsWith("http")) {
                    currentSumberUrl = data.url_sumber;
                    cekSumberBtn.classList.remove('hidden');
                } else {
                    cekSumberBtn.classList.add('hidden');
                }
                
            } catch (error) {
                console.error("AI Error:", error);
                alert("Gagal memuat Sirah AI. Penyebab: " + error.message); 
            } finally {
                overlay.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
        
        // Handler tombol Cek Sumber
        document.getElementById('cekSumberBtn').addEventListener('click', () => {
            if (currentSumberUrl) {
                window.open(currentSumberUrl, '_blank', 'noopener,noreferrer');
            }
        });

        // Fitur Copy Image
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            
            const targetElement = document.getElementById('captureArea');
            
            try {
                const dataUrl = await htmlToImage.toPng(targetElement, { 
                    pixelRatio: 2,
                    backgroundColor: "#ffffff",
                    style: { transform: 'scale(1)', transformOrigin: 'top left' }
                });

                const res = await fetch(dataUrl);
                const blob = await res.blob();
                
                try {
                    const item = new ClipboardItem({ 'image/png': blob });
                    await navigator.clipboard.write([item]);
                    btn.innerHTML = '&#10003; Tersalin!';
                } catch (err) {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `Kalender-KHGT-${formatDateISO(currentDate)}.png`;
                    a.click();
                    btn.innerHTML = '&#10003; Terunduh!';
                }
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
                
            } catch (error) {
                console.error("Gagal memproses gambar:", error);
                btn.innerHTML = 'Gagal!';
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadDateData(currentDate);
        });



        // ==========================================
        // FITUR INLINE FLOATING TOOLBAR (BUBBLE MENU)
        // ==========================================
        const toolbar = document.getElementById('inlineToolbar');
        let currentEditable = null;

        // Deteksi setiap kali pengguna selesai memblok teks
        document.addEventListener('mouseup', (e) => {
            // Jangan sembunyikan toolbar jika tombol di dalam toolbar sedang diklik
            if (e.target.closest('#inlineToolbar')) return;

            setTimeout(() => {
                const selection = window.getSelection();
                
                // Jika ada teks yang diseleksi (diblok)
                if (selection.toString().trim().length > 0) {
                    const range = selection.getRangeAt(0);
                    
                    // Cek apakah teks yang diseleksi berada di dalam kotak yang bisa diedit
                    let node = selection.anchorNode;
                    if (node.nodeType === 3) node = node.parentNode; // Ambil elemen induk jika berupa text node
                    
                    const editableParent = node.closest('[contenteditable="true"]');
                    
                    if (editableParent) {
                        currentEditable = editableParent;
                        const rect = range.getBoundingClientRect();
                        
                        // Kalkulasi posisi agar toolbar melayang tepat di atas teks yang diblok
                        const top = rect.top + window.scrollY - toolbar.offsetHeight - 10;
                        const left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                        
                        // Terapkan posisi dan tampilkan
                        toolbar.style.top = `${top}px`;
                        toolbar.style.left = `${left}px`;
                        toolbar.classList.remove('hidden');
                    } else {
                        toolbar.classList.add('hidden');
                    }
                } else {
                    toolbar.classList.add('hidden');
                }
            }, 10);
        });

        // Sembunyikan saat mulai mengetik
        document.addEventListener('keyup', (e) => {
            if (e.key !== 'Shift' && !e.ctrlKey) {
                const selection = window.getSelection();
                if (selection.toString().trim().length === 0) {
                    toolbar.classList.add('hidden');
                }
            }
        });

        // Eksekusi Format Teks (B, I, U)
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault(); // Wajib agar teks tidak kehilangan seleksi/blok saat tombol diklik
                const command = btn.getAttribute('data-command');
                
                // Gunakan document.execCommand untuk format teks inline
                document.execCommand(command, false, null);
            });
        });

        // Eksekusi Ubah Ukuran Teks (A+, A-)
        // Catatan: Ini akan memperbesar/memperkecil seluruh blok teks (Judul/Isi/Sumber) yang sedang aktif
        document.getElementById('inlineSizeUp').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if(currentEditable) ubahUkuranInline('up');
        });
        
        document.getElementById('inlineSizeDown').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if(currentEditable) ubahUkuranInline('down');
        });

        function ubahUkuranInline(action) {
            const style = window.getComputedStyle(currentEditable, null).getPropertyValue('font-size');
            const currentSize = parseFloat(style);
            
            const newSize = action === 'up' ? currentSize + 2 : currentSize - 2;
            currentEditable.style.fontSize = newSize + 'px';
            
            // Jaga line-height agar proporsional
            if (currentEditable.id === 'uiSirahJudul') {
                currentEditable.style.lineHeight = '1.2';
            } else {
                currentEditable.style.lineHeight = '1.5'; 
            }
        }

        
    </script>

<!-- INLINE FLOATING TOOLBAR -->
    <div id="inlineToolbar" class="absolute z-50 hidden bg-[#1e293b] text-white shadow-xl rounded-lg px-2 py-1 flex items-center gap-1 transition-opacity duration-200">
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded font-bold" data-command="bold" title="Bold (Ctrl+B)">B</button>
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded italic font-serif" data-command="italic" title="Italic (Ctrl+I)">I</button>
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded underline" data-command="underline" title="Underline (Ctrl+U)">U</button>
        
        <div class="w-px h-5 bg-gray-500 mx-1"></div> <!-- Garis pemisah -->
        
        <button id="inlineSizeDown" class="px-2 py-1 hover:bg-white/20 rounded font-semibold text-sm" title="Perkecil Ukuran Blok Teks">A-</button>
        <button id="inlineSizeUp" class="px-2 py-1 hover:bg-white/20 rounded font-semibold text-sm" title="Perbesar Ukuran Blok Teks">A+</button>
    </div>
</body>
</html>
