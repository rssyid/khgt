<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Hijriah Global Tunggal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Amiri:ital,wght@0,700;1,400&display=swap" rel="stylesheet" crossorigin="anonymous">
    <!-- Library untuk screenshot/copy image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        /* ============================================================
           KANVAS UTAMA
           - padding & border skala dengan container (cqw)
           - container-type: inline-size → anak pakai unit cqw
             (cqw = % lebar canvas, bukan viewport)
           ============================================================ */
        .square-wrapper {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1 / 1;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;

            /* Padding proporsional: ~3rem (48px) di 900px, ~1.5rem (24px) di 375px */
            padding: clamp(1rem, 3.55cqw, 2rem) clamp(1.5rem, 5.33cqw, 3rem);

            /* Aktifkan Container Query agar elemen anak bisa pakai cqw */
            container-type: inline-size;

            /* Border ganda yang skala proporsional terhadap kontainer */
            border: clamp(4px, 1.11cqw, 10px) solid #003F72;
            outline: clamp(1.5px, 0.44cqw, 4px) solid #003F72;
            outline-offset: clamp(-8px, -0.88cqw, -3px);
        }

        .watermark {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: -10%;
            width: 70%;
            opacity: 0.08;
            height: auto;
            z-index: 0;
            pointer-events: none;
            object-fit: contain;
        }

        /* ============================================================
           SISTEM TIPOGRAFI RESPONSIF (Container Query — unit cqw)
           Semua ukuran di bawah ini proporsional terhadap lebar canvas
           ============================================================ */

        /* Nama hari besar (SENIN, SELASA, …) (Diperbesar 1.3x) */
        .day-text {
            font-size: clamp(2.86rem, 11.54cqw, 6.5rem);
            letter-spacing: -0.03em;
            line-height: 1;
            /* Tambah space 2x di bawah hari */
            margin-bottom: clamp(1rem, 3.55cqw, 2rem);
        }

        /* Subtitle & akronim di header (Diperbesar 1.3x) */
        .canvas-title-sub {
            display: block;
            font-size: clamp(0.975rem, 2.6cqw, 1.46rem);
            letter-spacing: 0.2em;
        }
        .canvas-title-acr {
            font-size: clamp(1.625rem, 5.2cqw, 2.925rem);
            letter-spacing: 0.1em;
        }

        /* Badge nama event / hari khusus */
        .canvas-event-text {
            font-size: clamp(0.65rem, 1.78cqw, 1rem);
        }

        /* Pill pembungkus tanggal (Hijriah / Masehi) */
        .date-pill {
            border-radius: clamp(1.2rem, 4.44cqw, 2.5rem);
            padding: clamp(0.3rem, 1.11cqw, 0.625rem);
        }

        /* Kotak angka tanggal di dalam pill */
        .date-num-box {
            font-size: clamp(1.5rem, 5.33cqw, 3rem);
            height: clamp(2.5rem, 8.88cqw, 5rem);
            width: clamp(3.5rem, 12.44cqw, 7rem);
            border-radius: clamp(0.9rem, 3.2cqw, 1.8rem);
        }

        /* Teks bulan di dalam pill (Diperbesar 1.5x) */
        .date-month-text {
            font-size: clamp(1.275rem, 4cqw, 2.25rem);
        }

        /* Teks tahun di dalam pill (Diperbesar 1.5x) */
        .date-year-text {
            font-size: clamp(1.05rem, 3.33cqw, 1.875rem);
        }

        /* Gap antar baris tanggal (Hijriah & Masehi) - Diperbesar 2x */
        .date-rows-gap {
            display: flex;
            flex-direction: column;
            gap: clamp(0.7rem, 2.22cqw, 1.25rem);
        }

        /* Card sirah */
        .sirah-card {
            background-color: rgba(255, 255, 255, 0.65);
            padding: clamp(0.6rem, 2.22cqw, 1.25rem) clamp(1rem, 3.55cqw, 2rem);
            border-radius: clamp(0.6rem, 2.22cqw, 1.25rem);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            width: 88%;
            box-sizing: border-box;
            border: 1.5px solid rgba(6, 95, 70, 0.2);
        }

        /* Badge "Sirah Nabawiyah" */
        .sirah-badge-text {
            font-size: clamp(0.65rem, 1.78cqw, 1rem);
            padding: 0.2em clamp(0.5rem, 1.78cqw, 0.875rem);
        }

        /* Judul peristiwa sirah */
        .sirah-judul-text {
            font-size: clamp(1rem, 3.33cqw, 1.875rem);
        }

        /* Isi konten sirah */
        .sirah-konten-text {
            font-size: clamp(0.75rem, 2cqw, 1.125rem);
        }

        /* Sumber / kitab rujukan */
        .sirah-sumber-text {
            font-size: clamp(0.65rem, 1.78cqw, 1rem);
        }

        /* Font Amiri untuk judul sirah */
        .sirah-title-font {
            font-family: 'Amiri', serif;
        }

        /* Pastikan elemen b, i, u di-render dengan benar di dalam contenteditable */
        [contenteditable="true"] b { font-weight: bold; }
        [contenteditable="true"] i { font-style: italic; }
        [contenteditable="true"] u { text-decoration: underline; }

        [contenteditable="true"]:hover {
            background-color: rgba(0,0,0,0.03);
            border-radius: 6px;
            cursor: text;
        }
        [contenteditable="true"]:focus {
            outline: 2px dashed #065f46;
            background-color: rgba(0,0,0,0.01);
            border-radius: 6px;
        }

        /* ============================================================
           TOOLBAR RESPONSIF & MICRO-ANIMASI
           ============================================================ */
        #toolbar button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toolbar button:active {
            transform: scale(0.96);
        }
        @media (max-width: 640px) {
            #toolbar button, #toolbar input[type="date"] {
                height: 2.5rem; /* h-10 on mobile */
                font-size: 0.825rem;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
                border-radius: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- KONTROL NAVIGASI (Di luar canvas) -->
    <div id="toolbar" class="w-full max-w-[900px] bg-white rounded-2xl shadow-md border border-gray-100 p-4 mb-6 flex flex-col gap-4">
        <!-- Baris 1: Navigasi Tanggal & Tindakan Sirah -->
        <div class="flex flex-wrap gap-3 justify-between items-center w-full">
            <!-- Kelompok Navigasi -->
            <div id="toolbar-nav" class="flex gap-2 items-center flex-grow sm:flex-grow-0">
                <button id="prevBtn" class="flex items-center justify-center gap-1.5 h-11 px-4 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 rounded-xl font-semibold text-sm shadow-sm">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Prev
                </button>
                <input type="date" id="datePicker" class="h-11 px-4 border border-gray-200 text-gray-700 rounded-xl font-medium text-sm focus:outline-none focus:ring-2 focus:ring-[#2c2677]/20 focus:border-[#2c2677] transition shadow-sm flex-grow sm:flex-grow-0">
                <button id="nextBtn" class="flex items-center justify-center gap-1.5 h-11 px-4 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 rounded-xl font-semibold text-sm shadow-sm">
                    Next
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            
            <!-- Kelompok AI & Simpan Teks -->
            <div class="flex gap-2 items-center flex-wrap flex-grow sm:flex-grow-0 justify-end">
                <button id="aiBtn" class="flex items-center justify-center gap-2 h-11 px-4 bg-[#03a9f4] hover:bg-[#0288d1] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Generate Sirah (AI)
                </button>
                <button id="simpanTeksBtn" class="flex items-center justify-center gap-2 h-11 px-4 bg-[#7c3aed] hover:bg-[#6d28d9] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Simpan Teks
                </button>
                <button id="cekSumberBtn" class="flex items-center justify-center gap-1.5 h-11 px-4 bg-[#065f46] hover:bg-[#047857] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap hidden">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Cek Sumber
                </button>
            </div>
        </div>

        <!-- Divider Line -->
        <div class="h-px bg-gray-100 w-full"></div>

        <!-- Baris 2: Ekspor Gambar (Copy, Save, Share) -->
        <div class="flex flex-wrap gap-2.5 justify-center sm:justify-end items-center w-full">
            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider mr-auto hidden sm:inline-block">Ekspor Gambar:</span>
            <button id="copyBtn" class="flex items-center justify-center gap-2 h-11 px-5 bg-[#2c2677] hover:bg-[#201b58] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                Copy Image
            </button>
            <button id="saveImgBtn" class="flex items-center justify-center gap-2 h-11 px-5 bg-[#4b5563] hover:bg-[#374151] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Save Image
            </button>
            <button id="shareWaBtn" class="flex items-center justify-center gap-2 h-11 px-5 bg-[#25D366] hover:bg-[#20ba5a] text-white rounded-xl font-bold text-sm shadow-sm whitespace-nowrap">
                <svg class="w-5 h-5 flex-shrink-0 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.73-1.45L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.623-1.023-5.09-2.885-6.948C16.59 2.007 14.1 1.01 11.477 1.01c-5.447 0-9.875 4.372-9.88 9.802-.001 1.73.473 3.41 1.37 4.908l-.997 3.639 3.754-.975zm13.11-7.147c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                Share WA
            </button>
        </div>
    </div>

    <!-- CANVAS GAMBAR UTAMA -->
    <div class="square-wrapper" id="captureArea">
        <img src="/back.png" alt="Watermark Background" class="watermark">

        <!-- Bagian Judul -->
        <div class="relative z-10 flex-none text-center pt-1">
            <h1 class="font-extrabold text-gray-800 uppercase" style="line-height:1.15;">
                <span class="canvas-title-sub font-semibold text-[#2c2677] mb-0.5">Kalender Hijriah Global Tunggal</span>
                <span class="canvas-title-acr font-black text-[#2c2677]">(KHGT)</span>
            </h1>
        </div>

        <!-- CONTAINER UNTUK KONTEN DINAMIS (FADE TRANSITION) -->
        <div id="canvasDynamicContent" class="relative z-10 flex flex-col flex-grow w-full transition-opacity duration-300 opacity-100">
            <!-- Bagian Hari & Event -->
            <div class="flex-none flex flex-col items-center mt-[clamp(0.5rem,1.5cqw,1rem)]">
                <h2 id="uiHari" class="day-text font-black text-[#2c2677] uppercase drop-shadow-sm">-</h2>
                
                <!-- Wadah Event Dinamis (Muncul jika ada event di database) -->
                <div id="uiEventWrapper" class="mb-2 hidden">
                    <span id="uiEventName" class="canvas-event-text block font-semibold tracking-widest text-[#2c2677] px-3 py-0.5 bg-[#b3b6d4]/10 rounded-full"></span>
                </div>
                
                <!-- Wadah Kotak Tanggal -->
                <div class="w-full max-w-[75%] date-rows-gap">
                    <!-- Tanggal Hijriah -->
                    <div class="bg-[#b3b6d4] date-pill flex items-center shadow-md border border-white/50">
                        <div id="uiTglHijri" class="bg-white text-black font-black date-num-box flex items-center justify-center flex-none relative overflow-hidden">-</div>
                        <div class="flex-grow text-center text-white font-bold tracking-[0.15em] uppercase">
                            <span id="uiBulanHijri" class="date-month-text">-</span> <span id="uiTahunHijri" class="opacity-90 date-year-text">-</span>
                        </div>
                    </div>

                    <!-- Tanggal Masehi -->
                    <div class="bg-[#2c2677] date-pill flex items-center shadow-lg">
                        <div id="uiTglMasehi" class="bg-white text-black font-black date-num-box flex items-center justify-center flex-none relative overflow-hidden">-</div>
                        <div class="flex-grow text-center text-white font-bold tracking-[0.15em] uppercase">
                            <span id="uiBulanMasehi" class="date-month-text">-</span> <span id="uiTahunMasehi" class="opacity-90 date-year-text">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bagian Sirah Nabawiyah -->
            <div class="flex-grow flex flex-col items-center text-center mt-[clamp(1rem,2.22cqw,1.5rem)] px-2 justify-start w-full">
                <div class="sirah-card group flex flex-col items-center mx-auto">

                    <!-- SKELETON LOADER (Aktif saat AI dipanggil) -->
                    <div id="sirahSkeleton" class="hidden w-full flex flex-col items-center space-y-4 animate-pulse py-4">
                        <div class="h-[clamp(1.2rem,2.5cqw,1.8rem)] bg-gray-300/60 rounded-full w-32"></div>
                        <div class="h-[clamp(1.5rem,3cqw,2.2rem)] bg-gray-300/60 rounded w-3/4"></div>
                        <div class="w-full space-y-2.5 py-2">
                            <div class="h-[clamp(0.8rem,1.5cqw,1.1rem)] bg-gray-300/50 rounded w-full"></div>
                            <div class="h-[clamp(0.8rem,1.5cqw,1.1rem)] bg-gray-300/50 rounded w-11/12"></div>
                            <div class="h-[clamp(0.8rem,1.5cqw,1.1rem)] bg-gray-300/50 rounded w-5/6"></div>
                        </div>
                        <div class="h-[clamp(0.8rem,1.5cqw,1.1rem)] bg-gray-300/60 rounded w-1/3 mt-2"></div>
                    </div>

                    <!-- ISI UTAMA KONTEN SIRAH -->
                    <div id="sirahCardContent" class="flex flex-col items-center w-full transition-opacity duration-300 opacity-100">
                        <!-- Badge Kategori (Editable) -->
                        <div class="mb-[clamp(0.35rem,1cqw,0.6rem)]">
                            <span id="uiSirahKategori" contenteditable="true" class="sirah-badge-text bg-[#b3b6d4]/10 text-[#2c2677] rounded-full font-bold tracking-widest uppercase whitespace-nowrap">
                                Sirah Nabawiyah
                            </span>
                        </div>

                        <!-- Judul Peristiwa -->
                        <div class="mb-[clamp(0.35rem,1cqw,0.6rem)] w-full">
                            <h4 id="uiSirahJudul" contenteditable="true" class="sirah-title-font sirah-judul-text text-[#1e293b] font-bold leading-tight">
                                Judul Peristiwa
                            </h4>
                        </div>

                        <!-- Isi Konten -->
                        <div id="uiSirahKonten" contenteditable="true" class="sirah-konten-text text-[#334155] leading-relaxed font-normal w-full">
                            <p>Klik tombol AI di atas untuk menghasilkan ringkasan Sirah Nabawiyah secara otomatis sesuai tanggal hijriah.</p>
                        </div>

                        <!-- Sumber / Kitab Rujukan -->
                        <div class="mt-[clamp(0.5rem,1.3cqw,0.8rem)] pt-[clamp(0.35rem,1cqw,0.6rem)] border-t border-gray-200/80 w-full flex flex-col items-center">
                            <p id="uiSirahSumber" contenteditable="true" class="sirah-sumber-text text-[#b45309] font-medium italic mb-1.5">
                                (Kitab Rujukan)
                            </p>
                            <!-- Tombol Hapus Editan -->
                            <button id="resetTeksBtn" class="text-xs text-red-500 hover:text-red-700 font-semibold flex items-center gap-1 opacity-0 group-hover:opacity-60 hover:opacity-100 transition duration-200 pointer-events-auto">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Hapus Editan (Reset)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS CONTAINER -->
    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- INLINE FLOATING TOOLBAR -->
    <div id="inlineToolbar" class="absolute z-50 hidden bg-[#1e293b] text-white shadow-xl rounded-lg px-2 py-1 flex items-center gap-1 transition-opacity duration-200">
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded font-bold" data-command="bold" title="Bold (Ctrl+B)">B</button>
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded italic font-serif" data-command="italic" title="Italic (Ctrl+I)">I</button>
        <button class="format-btn px-2 py-1 hover:bg-white/20 rounded underline" data-command="underline" title="Underline (Ctrl+U)">U</button>
        
        <div class="w-px h-5 bg-gray-500 mx-1"></div> <!-- Garis pemisah -->
        
        <button id="inlineSizeDown" class="px-2 py-1 hover:bg-white/20 rounded font-semibold text-sm" title="Perkecil Ukuran Blok Teks">A-</button>
        <button id="inlineSizeUp" class="px-2 py-1 hover:bg-white/20 rounded font-semibold text-sm" title="Perbesar Ukuran Blok Teks">A+</button>
    </div>

    <script>
        let currentDate = new Date();
        const namaBulanMasehi = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function formatDateISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ============================================================
        // SISTEM TOAST NOTIFICATION & FADE TRANSITION
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-lg text-white text-sm font-semibold flex items-center gap-2 transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto`;
            
            if (type === 'success') {
                toast.classList.add('bg-green-600');
            } else if (type === 'error') {
                toast.classList.add('bg-red-600');
            } else {
                toast.classList.add('bg-gray-800');
            }
            
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => { toast.remove(); }, 300);
            }, 2500);
        }

        // Animasi transisi fade out -> update content -> fade in
        function fadeTransition(elementId, updateCallback) {
            const el = document.getElementById(elementId);
            if (!el) {
                updateCallback();
                return;
            }
            el.classList.remove('opacity-100');
            el.classList.add('opacity-0');
            
            setTimeout(() => {
                updateCallback();
                el.classList.remove('opacity-0');
                el.classList.add('opacity-100');
            }, 150);
        }

        async function loadDateData(dateObj) {
            const dateIso = formatDateISO(dateObj);
            document.getElementById('datePicker').value = dateIso;

            try {
                // Fetch data tanggal dari SQLite
                const response = await fetch(`/api/date/${dateIso}`);
                if (!response.ok) throw new Error("Data tidak tersedia");
                const data = await response.json();
                
                // Fetch data teks sirah tersimpan dari Neon DB
                let savedData = null;
                try {
                    const saveRes = await fetch(`/api/sirah-simpan?date=${dateIso}`);
                    if (saveRes.ok) {
                        savedData = await saveRes.json();
                    }
                } catch (e) {
                    console.warn("Gagal load teks tersimpan dari Neon DB:", e);
                }

                // Setelah data siap, jalankan animasi memudar secara serempak
                fadeTransition('canvasDynamicContent', () => {
                    // 1. Update Hari & Tanggal
                    document.getElementById('uiHari').innerText = data.weekday_name_id;
                    document.getElementById('uiTglHijri').innerText = data.hijri_day;
                    document.getElementById('uiBulanHijri').innerText = data.hijri_month;
                    document.getElementById('uiTahunHijri').innerText = data.hijri_year + " H";
                    
                    document.getElementById('uiTglMasehi').innerText = data.gregorian_day;
                    document.getElementById('uiBulanMasehi').innerText = namaBulanMasehi[data.gregorian_month - 1];
                    document.getElementById('uiTahunMasehi').innerText = data.gregorian_year + " M";

                    // 2. Update Event Badge
                    const eventWrapper = document.getElementById('uiEventWrapper');
                    const eventNameElem = document.getElementById('uiEventName');
                    if (data.event_name && data.event_name.trim() !== "") {
                        eventNameElem.innerText = data.event_name;
                        eventWrapper.classList.remove('hidden');
                    } else {
                        eventWrapper.classList.add('hidden');
                        eventNameElem.innerText = "";
                    }

                    // 3. Update Isi Kartu Sirah
                    if (savedData) {
                        document.getElementById('uiSirahKategori').innerText = savedData.kategori || "Sirah Nabawiyah";
                        document.getElementById('uiSirahJudul').innerText = savedData.judul;
                        document.getElementById('uiSirahKonten').innerHTML = savedData.konten_html;
                        document.getElementById('uiSirahSumber').innerText = savedData.sumber;
                    } else {
                        document.getElementById('uiSirahKategori').innerText = 'Sirah Nabawiyah';
                        document.getElementById('uiSirahJudul').innerText = 'Judul Peristiwa';
                        document.getElementById('uiSirahKonten').innerHTML = '<p>Klik tombol AI di atas untuk menghasilkan ringkasan Sirah Nabawiyah secara otomatis sesuai tanggal hijriah.</p>';
                        document.getElementById('uiSirahSumber').innerText = '(Kitab Rujukan)';
                        document.getElementById('cekSumberBtn').classList.add('hidden');
                    }
                });

            } catch (error) {
                console.warn("Data tanggal tidak ditemukan di database:", dateIso);
                // Reset ke default jika tanggal tidak ada
                fadeTransition('canvasDynamicContent', () => {
                    document.getElementById('uiHari').innerText = "-";
                    document.getElementById('uiTglHijri').innerText = "-";
                    document.getElementById('uiBulanHijri').innerText = "-";
                    document.getElementById('uiTahunHijri').innerText = "-";
                    document.getElementById('uiTglMasehi').innerText = "-";
                    document.getElementById('uiBulanMasehi').innerText = "-";
                    document.getElementById('uiTahunMasehi').innerText = "-";
                    document.getElementById('uiEventWrapper').classList.add('hidden');
                    
                    document.getElementById('uiSirahKategori').innerText = 'Sirah Nabawiyah';
                    document.getElementById('uiSirahJudul').innerText = 'Judul Peristiwa';
                    document.getElementById('uiSirahKonten').innerHTML = '<p>Klik tombol AI di atas untuk menghasilkan ringkasan Sirah Nabawiyah secara otomatis sesuai tanggal hijriah.</p>';
                    document.getElementById('uiSirahSumber').innerText = '(Kitab Rujukan)';
                    document.getElementById('cekSumberBtn').classList.add('hidden');
                });
            }
        }

        // Navigasi Hari
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() - 1);
            loadDateData(currentDate);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() + 1);
            loadDateData(currentDate);
        });

        document.getElementById('datePicker').addEventListener('change', (e) => {
            if (e.target.value) {
                currentDate = new Date(e.target.value);
                loadDateData(currentDate);
            }
        });

        // Variabel global untuk menyimpan URL sumber terakhir
        let currentSumberUrl = null;
        
        // Fitur AI Generate Sirah
        document.getElementById('aiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiBtn');
            const cekSumberBtn = document.getElementById('cekSumberBtn');
            
            if (btn.disabled) return;
        
            const skeleton = document.getElementById('sirahSkeleton');
            const content = document.getElementById('sirahCardContent');
            
            // Masuk ke state loading: Sembunyikan konten asli, tunjukkan skeleton berdenyut
            content.classList.add('hidden');
            skeleton.classList.remove('hidden');
            
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            cekSumberBtn.classList.add('hidden');
            currentSumberUrl = null;
        
            const bulan = document.getElementById('uiBulanHijri').innerText;
            const tanggal = document.getElementById('uiTglHijri').innerText;
        
            try {
                const response = await fetch(`/api/sirah?bulan=${bulan}&tanggal=${tanggal}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Terjadi kesalahan server");
                }
                
                const data = await response.json();
                
                // Isi konten baru
                document.getElementById('uiSirahKategori').innerText = "Sirah Nabawiyah";
                document.getElementById('uiSirahJudul').innerText = data.Judul;
                document.getElementById('uiSirahKonten').innerHTML = `<p>${data.kontent}</p>`;
                document.getElementById('uiSirahSumber').innerText = `(${data.sumber})`;
                
                // Simpan dan tampilkan tombol Cek Sumber jika URL valid
                if (data.url_sumber && data.url_sumber.trim() !== "" && data.url_sumber.startsWith("http")) {
                    currentSumberUrl = data.url_sumber;
                    cekSumberBtn.classList.remove('hidden');
                } else {
                    cekSumberBtn.classList.add('hidden');
                }
                
                // Tampilkan pesan sukses via Toast
                if (data._cached) {
                    showToast("⚡ Sirah dimuat instan dari cache database!");
                } else {
                    showToast("✨ AI sukses meracik peristiwa Sirah Nabawiyah!");
                }

                // Otomatis simpan hasil generate AI ke Neon DB
                autoSaveTeks();
                
            } catch (error) {
                console.error("AI Error:", error);
                showToast("❌ Gagal memuat Sirah AI: " + error.message, "error"); 
            } finally {
                // Keluar dari state loading
                skeleton.classList.add('hidden');
                content.classList.remove('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
        
        // Handler tombol Cek Sumber
        document.getElementById('cekSumberBtn').addEventListener('click', () => {
            if (currentSumberUrl) {
                window.open(currentSumberUrl, '_blank', 'noopener,noreferrer');
            }
        });

        // Filter stylesheet CORS untuk menghindari SecurityError di konsol browser
        const safeStylesFilter = (styleSheet) => {
            try {
                // Sentuh cssRules untuk cek CORS. Jika gagal, exception ditangkap dan dilewati.
                const rules = styleSheet.cssRules;
                return true;
            } catch (err) {
                return false; // Skip stylesheet yang memicu CORS error
            }
        };

        // Fitur Copy Image
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('copyBtn');
            btn.disabled = true;
            
            const targetElement = document.getElementById('captureArea');
            
            try {
                const dataUrl = await htmlToImage.toPng(targetElement, { 
                    pixelRatio: 2,
                    backgroundColor: "#ffffff",
                    styleSheetsFilter: safeStylesFilter,
                    style: { transform: 'scale(1)', transformOrigin: 'top left' }
                });

                const res = await fetch(dataUrl);
                const blob = await res.blob();
                
                try {
                    const item = new ClipboardItem({ 'image/png': blob });
                    await navigator.clipboard.write([item]);
                    showToast("📋 Gambar berhasil disalin ke clipboard!");
                } catch (err) {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `Kalender-KHGT-${formatDateISO(currentDate)}.png`;
                    a.click();
                    showToast("📥 Browser tidak mendukung clip, gambar diunduh!");
                }
                
            } catch (error) {
                console.error("Gagal memproses gambar:", error);
                showToast("❌ Gagal menyalin gambar!", "error");
            } finally {
                btn.disabled = false;
            }
        });

        // ==========================================
        // FITUR SAVE IMAGE (Download langsung)
        // ==========================================
        document.getElementById('saveImgBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveImgBtn');
            btn.disabled = true;

            try {
                const dataUrl = await htmlToImage.toPng(document.getElementById('captureArea'), {
                    pixelRatio: 2,
                    backgroundColor: "#ffffff",
                    styleSheetsFilter: safeStylesFilter,
                });
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `Kalender-KHGT-${formatDateISO(currentDate)}.png`;
                a.click();
                showToast("📥 Gambar kalender berhasil diunduh!");
            } catch (err) {
                console.error("Gagal save gambar:", err);
                showToast("❌ Gagal menyimpan gambar!", "error");
            } finally {
                btn.disabled = false;
            }
        });

        // ==========================================
        // FITUR SHARE WHATSAPP (Web Share API)
        // ==========================================
        document.getElementById('shareWaBtn').addEventListener('click', async () => {
            const btn = document.getElementById('shareWaBtn');
            btn.disabled = true;

            try {
                const dataUrl = await htmlToImage.toPng(document.getElementById('captureArea'), {
                    pixelRatio: 2,
                    backgroundColor: "#ffffff",
                    styleSheetsFilter: safeStylesFilter,
                });

                const res = await fetch(dataUrl);
                const blob = await res.blob();
                const fileName = `Kalender-KHGT-${formatDateISO(currentDate)}.png`;
                const file = new File([blob], fileName, { type: 'image/png' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: `Kalender KHGT - ${formatDateISO(currentDate)}`,
                    });
                    showToast("📲 Share menu berhasil dibuka!");
                } else {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = fileName;
                    a.click();
                    showToast("📥 Desktop fallback: Gambar berhasil diunduh!");
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    btn.disabled = false;
                    return;
                }
                console.error("Gagal share:", err);
                showToast("❌ Gagal membagikan gambar!", "error");
            } finally {
                btn.disabled = false;
            }
        });

        // ==========================================
        // FITUR SIMPAN TEKS KE NEON DB (Auto-Save & Manual)
        // ==========================================
        let autoSaveTimeout = null;

        function triggerAutoSave() {
            const btn = document.getElementById('simpanTeksBtn');
            btn.innerHTML = `<svg class="w-5 h-5 flex-shrink-0 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 3v3h-3"></path></svg> Menunggu...`;
            
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                autoSaveTeks();
            }, 1500); // Otomatis simpan jika berhenti mengetik selama 1.5 detik
        }

        async function autoSaveTeks() {
            const btn = document.getElementById('simpanTeksBtn');
            const payload = {
                date_iso: formatDateISO(currentDate),
                kategori: document.getElementById('uiSirahKategori').innerText.trim(),
                judul: document.getElementById('uiSirahJudul').innerText.trim(),
                konten_html: document.getElementById('uiSirahKonten').innerHTML,
                sumber: document.getElementById('uiSirahSumber').innerText.trim(),
            };

            try {
                const response = await fetch('/api/sirah-simpan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!response.ok) throw new Error("Server error");
                
                showToast("☁️ Perubahan teks otomatis tersimpan!");
                btn.innerHTML = `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Simpan Teks`;
            } catch (err) {
                console.error("Gagal simpan:", err);
                showToast("❌ Gagal menyimpan teks otomatis!", "error");
                btn.innerHTML = `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Simpan Teks`;
            }
        }

        // Trigger manual saat tombol diklik
        document.getElementById('simpanTeksBtn').addEventListener('click', () => {
            clearTimeout(autoSaveTimeout);
            autoSaveTeks();
        });

        // Pasang event listener input ke semua kolom editable untuk auto-save
        ['uiSirahKategori', 'uiSirahJudul', 'uiSirahKonten', 'uiSirahSumber'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', triggerAutoSave);
            }
        });

        // ==========================================
        // FITUR HAPUS EDITAN (RESET KE DEFAULT)
        // ==========================================
        document.getElementById('resetTeksBtn').addEventListener('click', async () => {
            if (!confirm("Apakah Anda yakin ingin menghapus semua kustomisasi pada tanggal ini dan mengembalikannya ke awal?")) {
                return;
            }

            const dateIso = formatDateISO(currentDate);
            try {
                const response = await fetch(`/api/sirah-simpan?date=${dateIso}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error("Gagal menghapus di server");

                showToast("🗑️ Editan berhasil dihapus. Konten kembali ke awal.");
                
                // Reset visual di HTML dengan transisi fade
                fadeTransition('sirahCardContent', () => {
                    document.getElementById('uiSirahKategori').innerText = 'Sirah Nabawiyah';
                    document.getElementById('uiSirahJudul').innerText = 'Judul Peristiwa';
                    document.getElementById('uiSirahKonten').innerHTML = '<p>Klik tombol AI di atas untuk menghasilkan ringkasan Sirah Nabawiyah secara otomatis sesuai tanggal hijriah.</p>';
                    document.getElementById('uiSirahSumber').innerText = '(Kitab Rujukan)';
                    document.getElementById('cekSumberBtn').classList.add('hidden');
                });

            } catch (err) {
                console.error("Gagal mereset teks:", err);
                showToast("❌ Gagal menghapus editan!", "error");
            }
        });

        // ==========================================
        // FITUR PINTASAN KEYBOARD (Arrow Navigation)
        // ==========================================
        document.addEventListener('keydown', (e) => {
            const activeEl = document.activeElement;
            if (activeEl && (
                activeEl.tagName === 'INPUT' || 
                activeEl.tagName === 'TEXTAREA' || 
                activeEl.isContentEditable
            )) {
                return;
            }

            if (e.key === 'ArrowLeft') {
                document.getElementById('prevBtn').click();
            } else if (e.key === 'ArrowRight') {
                document.getElementById('nextBtn').click();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadDateData(currentDate);
        });



        // ==========================================
        // FITUR INLINE FLOATING TOOLBAR (BUBBLE MENU)
        // ==========================================
        const toolbar = document.getElementById('inlineToolbar');
        let currentEditable = null;

        // Deteksi setiap kali pengguna selesai memblok teks
        document.addEventListener('mouseup', (e) => {
            // Jangan sembunyikan toolbar jika tombol di dalam toolbar sedang diklik
            if (e.target.closest('#inlineToolbar')) return;

            setTimeout(() => {
                const selection = window.getSelection();
                
                // Jika ada teks yang diseleksi (diblok)
                if (selection.toString().trim().length > 0) {
                    const range = selection.getRangeAt(0);
                    
                    // Cek apakah teks yang diseleksi berada di dalam kotak yang bisa diedit
                    let node = selection.anchorNode;
                    if (node.nodeType === 3) node = node.parentNode; // Ambil elemen induk jika berupa text node
                    
                    const editableParent = node.closest('[contenteditable="true"]');
                    
                    if (editableParent) {
                        currentEditable = editableParent;
                        const rect = range.getBoundingClientRect();
                        
                        // Kalkulasi posisi agar toolbar melayang tepat di atas teks yang diblok
                        const top = rect.top + window.scrollY - toolbar.offsetHeight - 10;
                        const left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                        
                        // Terapkan posisi dan tampilkan
                        toolbar.style.top = `${top}px`;
                        toolbar.style.left = `${left}px`;
                        toolbar.classList.remove('hidden');
                    } else {
                        toolbar.classList.add('hidden');
                    }
                } else {
                    toolbar.classList.add('hidden');
                }
            }, 10);
        });

        // Sembunyikan saat mulai mengetik
        document.addEventListener('keyup', (e) => {
            if (e.key !== 'Shift' && !e.ctrlKey) {
                const selection = window.getSelection();
                if (selection.toString().trim().length === 0) {
                    toolbar.classList.add('hidden');
                }
            }
        });

        // Eksekusi Format Teks (B, I, U)
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault(); // Wajib agar teks tidak kehilangan seleksi/blok saat tombol diklik
                const command = btn.getAttribute('data-command');
                
                // Gunakan document.execCommand untuk format teks inline
                document.execCommand(command, false, null);
            });
        });

        // Eksekusi Ubah Ukuran Teks (A+, A-)
        // Catatan: Ini akan memperbesar/memperkecil seluruh blok teks (Judul/Isi/Sumber) yang sedang aktif
        document.getElementById('inlineSizeUp').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if(currentEditable) ubahUkuranInline('up');
        });
        
        document.getElementById('inlineSizeDown').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if(currentEditable) ubahUkuranInline('down');
        });

        function ubahUkuranInline(action) {
            const style = window.getComputedStyle(currentEditable, null).getPropertyValue('font-size');
            const currentSize = parseFloat(style);
            
            const newSize = action === 'up' ? currentSize + 2 : currentSize - 2;
            currentEditable.style.fontSize = newSize + 'px';
            
            // Jaga line-height agar proporsional
            if (currentEditable.id === 'uiSirahJudul') {
                currentEditable.style.lineHeight = '1.2';
            } else {
                currentEditable.style.lineHeight = '1.5'; 
            }
        }

        
    </script>


</body>
</html>
